server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cjh?userSSL=false@serverTimezone=UTC&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis-plus:
  mapper-locations: classpath*:/Mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
logging:
  level:
    org.example.demo1.Mapper: DEBUG

